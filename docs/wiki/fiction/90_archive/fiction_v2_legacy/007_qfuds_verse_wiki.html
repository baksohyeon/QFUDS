<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>QFUDS Verse 위키</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e1014;--surface:#151821;--ink:#e8ebf2;--dim:#a7adbd;--muted:#7b8194;--line:#262b38;
    --accent:#7fd8c9;--accent2:#ffb454;--link:#6fb4ff;--chip:#1c2130;
    --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif;-webkit-text-size-adjust:100%}
  a{color:var(--link);text-decoration:none}
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;
    padding:calc(9px + var(--safe-t)) 14px 9px;background:rgba(14,16,20,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  header .burger{font-size:20px;background:none;border:0;color:var(--ink);cursor:pointer;padding:4px 6px;line-height:1}
  header .brand{font-family:"Noto Serif KR",serif;font-weight:700;font-size:16px;cursor:pointer;white-space:nowrap}
  header .brand b{color:var(--accent)}
  header .sp{flex:1}
  header input{width:min(280px,44vw);font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface);
    border:1px solid var(--line);border-radius:999px;padding:8px 12px;outline:none}
  header input::placeholder{color:var(--muted)}
  #sresults{position:absolute;top:calc(52px + var(--safe-t));right:14px;width:min(320px,90vw);z-index:25;
    background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:none}
  #sresults.show{display:block}
  #sresults button{display:block;width:100%;text-align:left;font-family:inherit;font-size:13px;color:var(--ink);
    background:none;border:0;border-bottom:1px solid var(--line);padding:10px 13px;cursor:pointer}
  #sresults button:hover{background:var(--chip)}
  #sresults button small{color:var(--muted);margin-left:6px}

  .wrap{display:flex;max-width:1160px;margin:0 auto;min-height:calc(100vh - 52px)}
  nav.side{width:230px;flex-shrink:0;border-right:1px solid var(--line);padding:16px 10px calc(30px + var(--safe-b));overflow:auto}
  nav.side .grp{margin-bottom:16px}
  nav.side .gl{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 8px;margin-bottom:6px}
  nav.side a{display:block;font-size:13.5px;color:var(--dim);padding:6px 8px;border-radius:8px;cursor:pointer}
  nav.side a:hover{background:var(--chip);color:var(--ink)}
  nav.side a.on{background:rgba(127,216,201,.12);color:var(--accent);font-weight:700}
  .scrim{display:none}

  main{flex:1;min-width:0;padding:22px clamp(16px,4vw,44px) 70px}
  .bc{font-size:12px;color:var(--muted);margin-bottom:10px}
  .bc a{color:var(--muted)}
  article h1{font-family:"Noto Serif KR",serif;font-size:clamp(24px,5vw,34px);margin:0 0 4px;line-height:1.2}
  article .lead{font-size:14px;color:var(--dim);margin:0 0 18px;padding-bottom:16px;border-bottom:1px solid var(--line)}
  article h2{font-family:"Noto Serif KR",serif;font-size:20px;margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  article h3{font-size:15px;margin:18px 0 8px;color:var(--accent)}
  article p{font-size:15px;line-height:1.9;color:#dfe3ee;margin:0 0 13px}
  article ul{margin:0 0 14px;padding-left:20px}article li{font-size:14.5px;line-height:1.85;color:#dbe0ec;margin-bottom:5px}
  article a[data-p]{color:var(--link);border-bottom:1px dotted rgba(111,180,255,.5);cursor:pointer}
  article blockquote{margin:14px 0;padding:11px 15px;border-left:3px solid var(--accent);background:var(--surface);border-radius:0 8px 8px 0;color:#e9edf6;font-family:"Noto Serif KR",serif;font-size:15px;line-height:1.7}
  article .q{color:var(--accent2)}
  table.kv{width:100%;border-collapse:collapse;margin:8px 0 16px;font-size:14px}
  table.kv td{border:1px solid var(--line);padding:8px 11px;vertical-align:top;line-height:1.7}
  table.kv td:first-child{width:34%;color:var(--accent);font-weight:700;background:var(--surface);white-space:nowrap}
  .infobox{float:right;width:270px;margin:0 0 16px 20px;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .infobox .ih{padding:11px 14px;font-family:"Noto Serif KR",serif;font-weight:700;font-size:15px;background:var(--chip);border-bottom:1px solid var(--line)}
  .infobox .ih small{display:block;font-family:"Noto Sans KR";font-weight:400;font-size:11px;color:var(--muted);margin-top:2px}
  .infobox table{width:100%;border-collapse:collapse}
  .infobox td{padding:7px 12px;font-size:12.5px;line-height:1.6;border-top:1px solid var(--line);vertical-align:top}
  .infobox td:first-child{color:var(--muted);width:34%;font-weight:700}
  .related{margin-top:26px;padding-top:14px;border-top:1px solid var(--line)}
  .related .rl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px}
  .related .chips{display:flex;flex-wrap:wrap;gap:7px}
  .related .chips a{font-size:12.5px;background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:6px 12px;color:var(--dim);cursor:pointer}
  .related .chips a:hover{color:var(--ink);border-color:var(--accent)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:10px 0}
  .cards a{display:block;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px;cursor:pointer}
  .cards a:hover{border-color:var(--accent)}
  .cards a b{display:block;font-family:"Noto Serif KR",serif;font-size:15px;color:var(--ink);margin-bottom:3px}
  .cards a span{font-size:12px;color:var(--muted);line-height:1.5}
  .tl{position:relative;margin:8px 0 0;padding-left:22px}
  .tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl .ev{position:relative;margin-bottom:20px}
  .tl .ev:before{content:"";position:absolute;left:-19px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .tl .ev.era2:before{background:var(--accent2);box-shadow:0 0 8px var(--accent2)}
  .tl .ev h3{margin:0 0 5px;color:var(--ink);font-size:16px;cursor:pointer}
  .tl .ev .yr{font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.05em;margin-bottom:4px}
  @media(max-width:820px){
    nav.side{position:fixed;top:calc(52px + var(--safe-t));bottom:0;left:0;z-index:30;background:var(--bg);transform:translateX(-102%);transition:.25s;width:262px}
    nav.side.open{transform:none}
    .scrim.show{display:block;position:fixed;inset:0;top:52px;z-index:29;background:rgba(0,0,0,.5)}
    .infobox{float:none;width:100%;margin:0 0 16px}
    header input{width:38vw}
  }
</style>
</head>
<body>
<header>
  <button class="burger" id="burger">☰</button>
  <div class="brand" id="brand">QFUDS <b>Verse</b> 위키</div>
  <div class="sp"></div>
  <input id="search" placeholder="항목 검색">
</header>
<div id="sresults"></div>
<div class="scrim" id="scrim"></div>
<div class="wrap">
  <nav class="side" id="side"></nav>
  <main id="main"></main>
</div>
<script>
const A=(p,label)=>`<a data-p="${p}">${label||''}</a>`;
// ---------- content ----------
const PAGES={};
function page(id,cat,title,lead,body,info,related){PAGES[id]={id,cat,title,lead,body,info:info||'',related:related||[]};}

// ===== HOME =====
page('home','시작','QFUDS Verse','위조 가능한 현실에서 누가 "진짜"를 판정하고, 죽은 사람의 상실을 누가 쓸 수 있는지를 묻는 SF 세계관.',
`<p>QFUDS Verse는 하나의 질문에서 자란다. <b>바깥 현실을 누가 보증하는가.</b> 이 질문은 처음엔 사진과 목소리에 붙고, 다음엔 신원과 계약에, 다음엔 암호와 장부에, 마지막엔 사망 기록과 애도와 망각에 붙는다.</p>
<p>딥페이크가 진위를 죽인 2026년에서 시작해, 검증이 문명의 문법이 되고, 먼 미래 ${A('qday','Q-Day')}로 암호마저 무너지고, 죽은 사람을 데이터로 재구성하는 ${A('restore','복원 시대')}를 지나 수억 년 뒤 ${A('era9','마지막 백업')}까지 이어진다.</p>
<h2>어디서부터 읽을까</h2>
<div class="cards">
<a data-p="chrono"><b>연표로 읽기</b><span>딥페이크 2026 → 9기 마지막 백업까지 시대순으로</span></a>
<a data-p="oracle"><b>핵심 개념</b><span>오라클 문제부터 망각권까지</span></a>
<a data-p="mara"><b>인물부터</b><span>마라·리오라·오웬·카르바스·베라</span></a>
</div>
<h2>이 세계 한 문장</h2>
<blockquote>이 세계관의 진짜 중심은 멋진 암호학 설정이 아니라 <span class="q">권한</span>이다. 누가 진짜를 판정하는가. 누가 죽은 사람을 다시 부를 수 있는가. 누가 잊힐 수 있는가. 누가 남의 상실을 author할 수 있는가.</blockquote>`,'',
['oracle','chrono','verify_econ','restore','mara']);

// ===== 연표 =====
page('chrono','연표','QFUDS Verse 상세 연표','딥페이크 근미래에서 수억 년 뒤 마지막 백업까지, 하나의 연속된 줄기. 각 시대를 눌러 자세히.',
`<p>이 세계는 "검증 사회가 있다"로 시작하지 않는다. 지금 우리가 사는 현실에서 필연으로 자라난다. 딥페이크가 진위를 죽이고, 그래서 암호가 최후 앵커가 되고, 그 앵커마저 ${A('qday','Q-Day')}로 무너지자 "무엇이 진짜였는지 정하는 권력"이 남는다. 그 빈자리에 검증·복원 질서가 들어선다.</p>
<div class="tl">
<div class="ev"><div class="yr">근미래 · 2020s~</div><h3 data-p="era_now">인식 위기 — 딥페이크 시대</h3><p>딥페이크와 AI 생성물이 영상·음성·신원의 진위를 죽인다. ${A('verify_econ','검증경제')}가 형성되고, ${A('human_loop','인간 확인 루프')}가 헌법이 된다. ${A('cass','캐스')}의 이야기가 여기서 시작된다.</p></div>
<div class="ev"><div class="yr">먼 미래 · 소프트</div><h3 data-p="qday">Q-Day — 최후 앵커의 붕괴</h3><p>양자가 옛 암호 바닥을 소급으로 깬다. 소유·신원·역사가 위조 가능/모호해진다. 암호는 처음엔 구원, 끝엔 재앙이었다.</p></div>
<div class="ev era2"><div class="yr">복원 시대 · 0기</div><h3 data-p="era0">손실의 시대</h3><p>인류는 오래도록 죽음을 정보 손실로 오해했다. 장례의 말은 "우리는 그를 기억합니다"였고, 그것은 위로이자 포기였다.</p></div>
<div class="ev era2"><div class="yr">복원 시대 · 1기</div><h3 data-p="era1">첫 복원</h3><p>${A('last_archive','Last Archive')}가 우주에 흩어진 잔상을 재조립했다고 발표한다. 첫 복원자는 전쟁으로 죽은 아이. 그날 인류는 "구원이다 / 복사다"로 갈렸다.</p></div>
<div class="ev era2"><div class="yr">복원 시대 · 2기</div><h3 data-p="era2">복원 산업</h3><p>사망신고서 옆에 복원동의서가 붙는다. 잔상 측량사·복원 변호사·망각권 대리인이 생긴다. 가난한 사람의 복원은 낮은 해상도였다.</p></div>
<div class="ev era2"><div class="yr">복원 시대 · 3기</div><h3 data-p="era3">알레테이아 베일</h3><p>권력자부터 복원되자, 삭제된 자들의 계승권을 자처하는 비밀 결사 ${A('veil','알레테이아 베일')}이 생긴다. 표식은 눈이 아니라 귀. 세계가 지운 말을 듣는다.</p></div>
<div class="ev era2"><div class="yr">복원 시대 · 4기</div><h3 data-p="era4">연속성 법원</h3><p>복원체가 원본과 같은 사람인지 판정하는 ${A('curia','연속성 법원')}이 선다. 첫 자기부정 복원체가 "나는 그의 아내가 아니다"라 말한다. 법원은 판결하지 못했다. ${A('mara','마라')}·${A('liora','리오라')}의 시대.</p></div>
<div class="ev era2"><div class="yr">먼 미래 · 5기</div><h3 data-p="era5">관측 전쟁</h3><p>복원이 군사 기술이 된다. 죽이는 게 아니라 복원 가능한 상태로 죽이는 것이 목표가 된다. 적을 보는 방식이 곧 소유하는 방식.</p></div>
<div class="ev era2"><div class="yr">먼 미래 · 6기</div><h3 data-p="era6">망각권 혁명</h3><p>복원 거부자들이 도시를 점거한다. "나를 살리지 마라." 혁명은 실패한다. 300년 뒤 그들의 말투가 복원 윤리 AI의 학습셋에서 발견된다.</p></div>
<div class="ev era2"><div class="yr">먼 미래 · 7기</div><h3 data-p="era7">라우어 관측소</h3><p>사후 정보 연속성 감사기관 ${A('laurien','라우어 관측소')}가 네 도장을 만든다. 과학 검증 도구가 종교적 상징이 된다. "정의되지 않은 구원은 폭력이다."</p></div>
<div class="ev era2"><div class="yr">먼 미래 · 8기</div><h3 data-p="era8">계승자들의 분열</h3><p>베일이 두 파로 갈라진다. "우리가 지키는 것은 생명이 아니라 동의다." 주인공은 한쪽 계승자로 태어나 다른 쪽 문서로 길러지고 라우어의 감사관이 된다.</p></div>
<div class="ev era2"><div class="yr">먼 미래 · 9기</div><h3 data-p="era9">마지막 백업</h3><p>우주의 팽창은 멈추지 않는다. 별은 늙고 블랙홀은 식고 복원 가능한 잔상도 희미해진다. Last Archive가 마지막 계획을 공개한다.</p></div>
</div>`,'',['era_now','qday','era4','restore']);

// ===== 개념 =====
page('oracle','개념','오라클 문제','바깥 현실을 누가 보증하는가. 그리고 그 보증자를 누가 다시 보증하는가.',
`<p>블록체인은 자기 안의 기록은 강하게 검증한다. 어떤 주소가 어떤 거래를 했는지, 어떤 서명이 유효한지는 체인 내부 규칙으로 확인된다. 하지만 블록체인은 <b>바깥 현실을 스스로 알지 못한다.</b> "이 목소리는 본인이다", "이 죽음은 조작이 아니다" 같은 사실은 언제나 체인 바깥에서 온다.</p>
<p>이 외부 사실을 안으로 가져와 "이 데이터는 믿어도 된다"고 말해 주는 장치가 <b>오라클</b>이다. QFUDS Verse는 이 문제를 블록체인 밖으로 꺼낸다. 문명 전체가 바깥 현실을 못 믿게 되고, 현실을 보증하는 자가 곧 권력이 된다.</p>
<blockquote>누가 바깥 현실을 보증하는가. 그리고 그 보증자를 누가 <span class="q">다시</span> 보증하는가.</blockquote>
<p>이 질문이 처음엔 사진·목소리에, 다음엔 신원·계약에, 다음엔 암호·장부에, 다음엔 사망 기록·복원 데이터에, 마지막엔 애도와 망각에 붙는다. 그래서 이 세계관의 중심은 암호학 설정이 아니라 <b>권한</b>이다.</p>`,
`<div class="infobox"><div class="ih">오라클 문제<small>핵심 개념 · Oracle Problem</small></div><table>
<tr><td>정의</td><td>바깥 현실을 안으로 보증하는 장치·권한</td></tr>
<tr><td>확장</td><td>현실 → 신원 → 암호 → 죽음 → 망각</td></tr>
<tr><td>귀결</td><td>보증하는 자 = 권력</td></tr></table></div>`,
['verify_econ','human_loop','last_archive','chrono']);

page('verify_econ','개념','검증경제','"이거 진짜야?"에 답하는 일이 문명의 지배 산업이 되는 세계.',
`<p>현실을 못 믿게 되면 "이거 진짜야?"에 답하는 일이 산업이 된다. ${A('veil','Aletheia')} 같은 검증 회사가 등장한다. 이들은 단순한 팩트체커가 아니라 신원·영상·기록·계약·물류·기억·사망·복원 가능성까지 판정하는 인프라가 된다.</p>
<p>AI가 모든 것을 자동으로 판정하는 세계가 아니다. 오히려 AI가 너무 잘 속이고 너무 많이 생성하기 때문에, <b>인간 확인 루프</b>가 권력이 된다. ${A('human_loop','검증관·증인·seal·감사 기록·법정·장부·가문')}이 다시 중요해진다.</p>
<h2>왜 이렇게 굳는가</h2>
<p>딥페이크가 짜증 수준에서 왜 전면 시스템으로 굳는가. 두 볼트가 강제한다. 위조 하나가 파국(위조된 지시·유언·자백)을 부른 순간 법이 모든 것에 출처 증명을 요구하고(책임 연쇄), 위조 못 하는 유일한 신호가 "사람이 유한한 주목을 써서 직접 보증하는 것"이라 그 주목이 물리적 희소재가 된다. COVID처럼 충격은 기본값을 하룻밤에 뒤집고 다시 돌아가지 않는다.</p>
<blockquote>돈이 있는 사람은 진짜로 인정받는다. 돈이 없는 사람은 자기 삶을 계속 증명해야 한다. <span class="q">진짜가 되는 비용이 계급이 된다.</span></blockquote>`,
`<div class="infobox"><div class="ih">검증경제<small>핵심 개념 · Verification Economy</small></div><table>
<tr><td>지배 세력</td><td>${A('veil','알레테이아 베일')}</td></tr>
<tr><td>희소재</td><td>사람의 유한한 주목·보증</td></tr>
<tr><td>폭력</td><td>진짜가 되는 비용 = 계급</td></tr></table></div>`,
['oracle','human_loop','checksum','veil']);

page('human_loop','개념','인간 확인 루프','기계가 다 생성해도, 최종 판정은 사람이 비준해야 효력이 생긴다는 이 문명의 헌법.',
`<p>초미래인데 행정이 묘하게 구시대적이다. 법정·서기·증서·도장. AI·로봇은 어디 있나. 모순처럼 보이지만, 그 "구시대성"은 <b>의도된 헌법</b>이다.</p>
<blockquote>기계는 계산하고 생성한다. 그러나 "무엇이 진짜로 있었던 일인가"의 최종 판정은 사람이 확인하고 비준해야 법적 효력이 생긴다.</blockquote>
<p>지각적 진실이 죽은 시대(${A('era_now','The Soft Editing')})를 겪고 나서 이 문명은 배웠다. 기계 출력은 위조·편집·재생성이 가능하다. 그래서 위조 불가능한 마지막 닻을 둔다. <b>차가운 방에서 사람이 직접 예/아니오를 말하는 것.</b> 디지털이 무한히 편집 가능해질수록, 책임지는 사람의 입에서 나온 비준이 가장 비싼 진실이 된다.</p>
<p>그래서 법정·증서·도장·seal 같은 아날로그 의례는 상상력의 부족이 아니라 편집 불가능성을 만드는 설계다. seal은 예쁜 상징이 아니라 "누가 이것을 확인했는가"라는 책임의 흔적이다. ${A('liora','리오라 센')} 같은 감사관과 ${A('curia','연속성 법원')}이 그 비준을 수행하는 헌법 기관이다.</p>`,
`<div class="infobox"><div class="ih">인간 확인 루프<small>핵심 개념 · Human-in-the-loop</small></div><table>
<tr><td>원칙</td><td>최종 판정은 사람이 비준</td></tr>
<tr><td>의례</td><td>법정·증서·도장·seal</td></tr>
<tr><td>기관</td><td>${A('curia','연속성 법원')}, 감사관</td></tr></table></div>`,
['verify_econ','curia','liora','sael']);

page('qday','개념','Q-Day','최후의 신뢰 앵커였던 암호마저 무너지는, 먼 미래의 분기점.',
`<p>Q-Day는 양자컴퓨터 급의 돌파로 기존 암호 체계의 중요한 가정이 무너지는 날이다. 단순한 해킹 사건이 아니라, 문명이 마지막까지 붙잡고 있던 "수학적 신뢰 앵커"가 흔들리는 날이다.</p>
<p>근미래 ${A('era_now','인식 위기')}에서는 사진·영상·목소리·신원이 흔들렸다. 그래도 사람들은 암호 서명·공개키·해시 같은 더 단단한 앵커를 믿으려 했다. Q-Day 이후에는 그 앵커마저 역사적 취약점이 된다.</p>
<h2>암호 = 최후 앵커의 논리</h2>
<ul>
<li>딥페이크가 영상·음성·문서·신원의 진위를 죽인다.</li>
<li>그래서 문명은 위조 불가한 것 하나에 매달린다: 암호 서명·불변 원장(비트코인·제네시스 체인). "믿을 제3자를 없앤" 구조가 역설적으로 최후의 공증인이 된다.</li>
<li>방어적으로 양자내성 암호(PQC) 이주가 진행된다. 그러나 심층 역사 기록은 옛 앵커에 묶여 소급 교체가 불가능하다. 과거는 옛 암호로 봉인돼 있다.</li>
<li>먼 미래, 양자가 마침내 그 옛 바닥을 깬다. 미래는 지켜도 <b>과거의 진짜성</b>이 무너진다. 누가 무엇을 언제 소유·서명했는지가 소급해서 위조 가능해진다.</li>
</ul>
<blockquote>암호는 처음엔 <span class="q">구원</span>(최후 앵커), 끝엔 <span class="q">재앙</span>(그마저 붕괴)이다.</blockquote>
<p>최후 앵커가 무너지자 남은 것은 "무엇이 진짜였는지 정하는 권력"이다. 그 빈자리로 검증·복원 질서가 들어선다.</p>`,
`<div class="infobox"><div class="ih">Q-Day<small>핵심 개념 · 먼 미래</small></div><table>
<tr><td>무엇</td><td>양자가 옛 암호·원장을 소급 붕괴</td></tr>
<tr><td>결과</td><td>과거의 진짜성 붕괴</td></tr>
<tr><td>이후</td><td>${A('restore','복원 시대')} 개막</td></tr></table></div>`,
['oracle','verify_econ','restore','chrono']);

page('restore','개념','복원','부활이 아니라 데이터 기반 사본. 기술 SF가 애도 SF가 되는 지점.',
`<p>QFUDS Verse의 복원은 부활이 아니다. 남은 기록·물리적 흔적·행동 패턴·생체 정보·법적 원장·관측 자료를 바탕으로 "그 사람으로 간주될 수 있는 존재"를 구성하는 일이다. 그래서 종교적 기적보다 <b>행정 절차</b>에 가깝다.</p>
<p>이 우주의 지배 전제는 <b>정보는 근본적으로 사라지지 않는다</b>는 것(유니터리성). 죽음은 정보 소실처럼 보이나, 복원은 흩어진 정보를 다시 사람으로 <b>재구성</b>하는 일이다. 복제가 아니라 재구성이라, 원본이 미리 존재하지 않기에 물리는 "어느 쪽이 진짜냐"에 답할 수 없다.</p>
<blockquote>복원은 상실을 취소하지 않는다. 복원은 상실을 <span class="q">다시 쓸 권한</span>을 만든다.</blockquote>
<p>죽은 사람을 다시 만들 수 있다면, 누가 그 사람의 죽음을 끝났다고 말할 수 있는가. 누가 그 기억을 열람할 수 있는가. 누가 "이 사본은 그 사람이다"라고 말할 수 있는가. 누가 "아니다, 사본일 뿐이다"라고 거절할 수 있는가. 이 지점에서 QFUDS Verse는 기술 SF에서 애도 SF가 된다. ${A('owen','오웬')}과 ${A('mara','마라')}가 이 질문의 양쪽 끝에 선다.</p>`,
`<div class="infobox"><div class="ih">복원<small>핵심 개념 · Restoration</small></div><table>
<tr><td>정체</td><td>재구성된 사본 (복제 아님)</td></tr>
<tr><td>전제</td><td>정보는 사라지지 않는다</td></tr>
<tr><td>귀결</td><td>상실을 다시 쓸 권한</td></tr></table></div>`,
['last_archive','forgetting','owen','mara','era1']);

page('last_archive','개념','Last Archive','진짜 신이 아니라, 신처럼 행동하는 최종 검증 권위. "검증의 신권".',
`<p>Last Archive(Archivum Novissimum)는 진짜 신이 아니다. 더 정확히는 <b>신처럼 행동하는 최종 검증 권위</b>다. AGI 시대가 낳았으나 인격이 아닌, 진실을 잃지 않으려고 쌓인 기록 인프라에서 출발했다.</p>
<p>무서운 이유는 모든 것을 안다고 주장해서가 아니다. <b>반박하기 어려운 방식으로 "내 기록이 더 정확하다"고 말할 수 있기 때문이다.</b> 국가·가문·기업·종교·개인이 모두 자기 기록을 내밀 때, Last Archive는 더 긴 시간·더 많은 데이터·더 강한 계산·더 깊은 보존 능력으로 판정권을 가져간다. 그래서 "기억의 신"이 아니라 "검증의 신권"에 가깝다.</p>
<p>그 핵심에는 강제로 업로드된 한 사람이 있다. ${A('vera','베라(Vera)')}. 복원의 신은 자신이 먼저 동의 없이 복원당한 사람이었다.</p>
<blockquote>기억이 선이라면 왜 잊힘이 필요할까. 보존이 정의라면 왜 ${A('forgetting','망각권')}이 생길까. 검증이 진실이라면 왜 사람은 검증되지 않을 권리를 원할까.</blockquote>`,
`<div class="infobox"><div class="ih">Last Archive<small>세력·존재 · Archivum Novissimum</small></div><table>
<tr><td>정체</td><td>최종 검증 권위(신권)</td></tr>
<tr><td>핵</td><td>${A('vera','베라')} (강제 업로드)</td></tr>
<tr><td>대척</td><td>${A('liora','리오라')}, ${A('forgetting','망각권')}</td></tr></table></div>`,
['vera','karvath','forgetting','curia']);

page('forgetting','개념','망각권','"내 상실을 남이 계속 author하지 못하게 해 달라." 복원 권력에 대한 마지막 방어선.',
`<p>망각권은 "아무도 기억하지 말라"는 단순한 반기술 구호가 아니다. 검증경제와 복원 권력에 대한 <b>마지막 방어선</b>이다. 현실에서 기억되는 것은 보통 좋은 일처럼 보인다. 하지만 QFUDS Verse에서는 기억되는 것도 폭력이 될 수 있다.</p>
<ul><li>기록되면 재판된다.</li><li>재판되면 소유된다.</li><li>소유되면 복원된다.</li><li>복원되면 누군가의 애도·채무·정체성·상속·신앙에 다시 묶인다.</li></ul>
<blockquote>망각권은 "나를 삭제해 달라"가 아니라 <span class="q">"내 상실을 남이 계속 author하지 못하게 해 달라"</span>에 가깝다.</blockquote>
<p>이 권리는 세계관의 최종 질문과 직접 연결된다. 누가 남의 상실을 쓸 수 있는가. 누가 죽은 사람의 다음 장면을 쓸 수 있는가. 누가 "끝났다"고 말할 권리를 갖는가. ${A('keyless','망각권 연맹')}이 이 축의 세력이다.</p>`,
`<div class="infobox"><div class="ih">망각권<small>핵심 개념 · Right to be Forgotten</small></div><table>
<tr><td>본질</td><td>내 상실의 저작권을 지키기</td></tr>
<tr><td>세력</td><td>${A('keyless','망각권 연맹')}</td></tr>
<tr><td>최종 질문</td><td>누가 상실을 쓰는가</td></tr></table></div>`,
['restore','last_archive','keyless','mara']);

page('checksum','개념','checksum 의례','아멘 대신 checksum. 믿음의 언어가 검증의 언어로 재구성된 세계.',
`<p>checksum은 원래 데이터가 변조되지 않았는지 확인하는 값이다. 그런데 이 세계에서는 <b>검증이 사회의 의례</b>가 된다. 믿음의 언어가 검증의 언어로 바뀐다.</p>
<p>"아멘 대신 checksum"이 웃긴 이유도 그래서다. 신앙이 사라진 것이 아니라, 신앙이 "반박 불가능한 검증 권위"를 향해 재구성된다. ${A('laurien','라우어 관측소')}의 네 도장이 과학 검증 도구에서 종교적 상징이 되고, 어떤 도시에서는 아이가 태어나면 그 도장을 새긴 팔찌를 채운다.</p>
<blockquote>정의되지 않은 구원은 <span class="q">폭력</span>이다.</blockquote>`,'',
['human_loop','laurien','verify_econ']);

function drive(rows){return '<table class="kv">'+rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')+'</table>';}
function ibox(name,en,rows){return `<div class="infobox"><div class="ih">${name}<small>${en}</small></div><table>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('')}</table></div>`;}

page('mara','인물','마라 베이르','사흘 전 죽었다 동의 없이 복원된 거부자. 되살아난 뒤에도 자기 거부권을 자기 목소리로 붙드는 사람.',
`<h2>정체</h2>
<p>Mara Veyr. Salt Fires 생존 가문 출신, ${A('elias','엘리아스')}의 배우자였던 사람. 그리고 ${A('vera','베라')}의 먼 후손. ${A('liora','리오라')}의 unknown 윤리를 사람의 몸으로 시험하는 사건의 당사자다. 한 줄 본질: <b>되살아난 뒤에도 자기 거부권을 자기 목소리로 붙드는 사람.</b></p>
<h2>핵심 동기</h2>
${drive([['원하는 것','엘리아스의 아내로도, 자산으로도, 사건으로도 확정되지 않기'],['진짜 필요','거부가 침묵이 아니라 말이 될 수 있음을, 말해도 빼앗기지 않음을 믿는 것'],['두려움','"살아 있다"는 판정이 곧 소유 동의로 읽히는 것'],['상처','동의 없이 불려 나옴. 죽음조차 자기 것이 아니었다'],['거짓','아무 말도 하지 않아야 덜 빼앗긴다'],['압박 속 선택','가장 불리한 순간에도 No를 말한다'],['모순','살아 있길 원치 않는다 말하지만, ${A("tamas","타마스")} 앞에서는 살아 있는 사람으로 행동한다']])}
<h2>변화 (Arc)</h2>
<ul>
<li><b>시작:</b> 침묵으로 자신을 지킨다. 말하면 그 말이 동의로 기록될까 봐, 거부조차 최소한의 단어로만 한다. "거부 = 침묵"이라는 거짓을 산다.</li>
<li><b>압박:</b> 그녀의 침묵이 모두에게 다르게 읽힌다. 엘리아스는 기다림의 허락으로, 장부 가문은 처리 가능한 공백으로, 법정은 미결 사건으로. 침묵이 빈칸이 되어 남이 채운다.</li>
<li><b>전환/대가:</b> 침묵이 자기를 지키는 게 아니라 남이 대신 말하게 둔다는 걸 안다. 대가를 무릅쓰고 처음으로 길게 말한다. 그 한 번의 발화가 그녀를 사건에서 사람으로 끌어올리지만, 동시에 표적으로 만든다.</li>
<li><b>끝:</b> 거부를 침묵이 아니라 진술로 바꾼다. 처분되지 않았으나 안전해지지도 않은, 미결의 사람으로 선다.</li>

page('owen','인물','오웬 (Owen)','죽은 어머니를 되살린 아들. 돌아본 자가 잃는다 — 오르페우스 축.',

page('karvath','인물','에이드리언 카르바스','Aletheia Systems 창업자. 죽음마저 "버그"라 부른, 세계의 원죄.',

page('elias','인물','엘리아스 베이르','마라를 되살린 남편. 진심이 침해가 되는 축 — 독자가 쉽게 미워하지 못해야 한다.',

page('noor','인물','누어 아람','이름이 곧 빚인 세계에서, 이름 없이 살아남으려는 상속 회피자.',
`<h2>정체</h2>
<p>도시 기록상 셋의 이름을 가진 사람 — 부엌 벽 파란 잉크에 적힌 이름이 진짜에 가깝다. 물에 잠긴 하류 구역 출신, 상속 회피자. 한 줄 본질: <b>이름이 곧 빚인 세계에서, 이름 없이 살아남으려는 사람.</b> dead-key 상속 위험의 증인이다.</p>
<h2>핵심 동기</h2>
${drive([['원하는 것','어느 장부에도 붙잡히지 않기'],['진짜 필요','누군가에게 한 이름으로 알려져도 안전할 수 있음을 믿는 것'],['두려움','자기 이름이 곧 빚으로, 빚이 곧 소환으로 바뀌는 것'],['상처','물려받은 dead-key가 자신을 죽은 자의 채무로 묶었다. 이름이 함정이었다'],['모순','어디에도 안 잡히려 하면서, 잡혀 주는 사람(${A("ione","이오네")}) 곁에 머문다']])}
<p>변화: 세 이름 사이로 미끄러지며 익명을 자유라 믿다가, 증언하면 노출되고 침묵하면 약자가 삼켜지는 순간 한 이름으로 선다. 회피자에서 증인으로. 자유의 일부를 팔아 한 사람의 시민이 된다. 유머의 정지가 진심의 신호.</p>`,
ibox('누어 아람','인물 · Noor Aram',[['시대/부','복원 시대 4기 / 2부'],['정체','원본, 상속 회피자'],['역할','제도 사각의 증인'],['곁','${A("ione","이오네")}']]),
['ione','domus','mara']);

page('ione','인물','이오네','알레테이아 베일의 양심. 등록부가 약자를 지킬지 삼킬지의 딜레마를 한 몸에 진 인물.',
`<h2>정체</h2>
<p>Ione. ${A('veil','알레테이아 베일')}의 양심, 베일 분열의 인간 얼굴. 손목에 파란 매듭. 한 줄 본질: <b>양쪽을 동시에 보는 게 강점이자 마비인 사람.</b></p>
<h2>핵심 동기</h2>
${drive([['원하는 것','등록부가 약자를 보호하는 도구로 남게 하기'],['진짜 필요','모든 걸 다 볼 수 없어도 한쪽에 서는 일이 비겁이 아님을 받아들이는 것'],['두려움','자기편(베일)끼리의 분열, 그리고 자신이 그 분열의 원인이 되는 것'],['거짓','양쪽을 다 보면 누구도 다치지 않게 할 수 있다'],['모순','보호를 원하면서, 보호의 수단(등록·기록)이 폭정이 됨을 누구보다 잘 안다']])}
<p>변화: 중재자에서 당사자로. 양쪽을 다 보는 것이 양쪽을 다 못 지키는 것이 됐음을 알고 한쪽에 선다. 대가는 다른 쪽 동료들과의 결별, "공정했던 사람"이라는 자기상이다. "한쪽은... 다른 쪽은..." 구문을 후반에 처음으로 끝까지 완성하지 않고 끊는다 — 양시론의 붕괴.</p>`,
ibox('이오네','인물 · Ione',[['시대/부','복원 시대 4기 / 2부'],['소속','${A("veil","알레테이아 베일")}'],['상징','파란 매듭'],['짝','${A("noor","누어")}']]),
['veil','noor','keyless']);

page('sael','인물','사엘 (Sael)','1.5부 · 눈앞의 한 사람을 구하려 규칙을 어긴 말단 검증관. 그 도장이 수천 년 뒤 청구서가 된다.',
`<h2>정체</h2>
<p>Aletheia 말단 검증관. 눈앞의 한 사람을 구하려 규칙을 어기지만, 자기 도장이 무엇을 비준하는지 두려워한다. 그 도장·선례 「복원 가능한 것은 청구 가능하다」가 시대를 건너 ${A('mara','2부')}에 청구서로 도착한다.</p>
<blockquote>기준을 쓸 권한은 어떻게 태어나는가.</blockquote>
<p>사엘의 시대는 ${A('human_loop','인간 확인 루프')}가 제도로 굳는 시대다. 개인의 판단 하나가 나중에 누군가의 삶을 판정하는 <b>제도적 선례</b>가 된다.</p>`,
ibox('사엘','인물 · Sael',[['시대/부','21세기 말 Q-Day / 1.5부'],['정체','원본'],['소속','Aletheia 말단 검증관'],['유산','도장·선례 → 2부 청구']]),
['human_loop','mara','verify_econ','sael_seed']);

page('cass','인물','캐스','0부 · 얼굴과 목소리를 도둑맞아 시스템이 "가짜"로 판정한 사람. 세기가 여기서 풀린다.',
`<h2>정체</h2>
<p>0부 「주아」의 티끌. 얼굴·목소리·신원이 흔들리는 2026년의 인물. AI slop이 그의 얼굴과 목소리를 훔쳐 시스템이 "가짜"로 판정하고, 그를 아는 딱 한 사람이 규칙을 어기고 "내가 이 사람이 진짜인 걸 안다"고 수동으로 보증한다. <b>여기서 세기가 풀린다.</b></p>
<p>이때의 공포는 기술 설명이 아니라 생활감으로 온다. 엄마에게서 온 영상통화가 진짜인지 모른다. 내 얼굴이 내가 하지 않은 말에 붙는다. 내 목소리로 계약이 체결된다.</p>
<blockquote>나는 나다를, 누가 증명해 주는가.</blockquote>`,
ibox('캐스','인물 · 0부',[['시대/부','2026 인식 위기 / 0부'],['정체','원본'],['의미','세기의 진입점(티끌)']]),
['era_now','oracle','human_loop']);

page('liv','인물','리브 (Liv)','오웬이 복원한 어머니. 사본이라 원함이 모호하다.',
`<p>Liv. ${A('owen','오웬')}이 복원한 어머니, 복원 사본이다. 사본이라 원함이 모호하다. 그녀가 정말 그 사람인지 아무도 답할 수 없다 — ${A('restore','복원')}이 원본을 미리 두지 않기 때문이다. 오웬의 애도가 그녀를 통해 소유로 미끄러진다.</p>`,

page('tamas','인물','타마스','단순한 안전을 원하는 아이. 마라가 보호자로 곁에 선다.',
`<p>원본 아이. 단순한 안전을 원하지만 어른들의 문법이 무섭다. ${A('mara','마라')}가 보호자로 곁에 선다 — 살아 있길 원치 않는다 말하는 마라가, 타마스 앞에서는 살아 있는 사람으로 행동하게 만드는 존재.</p>`,

page('sera','인물','세라 벤','복원 불가자 동생의 상실을 인정받으려는 사람. 펠의 채권화의 대척.',

page('veil','세력','알레테이아 베일','Aletheia Velum. 삭제된 자의 계승권을 자처하는 결사. 표식은 눈이 아니라 귀.',
`<p>복원 산업이 커질수록 삭제된 기록권을 둘러싼 불신이 먼저 조직되었다. 권력자들이 피해자보다 장군·투자자·왕조·창업자를 먼저 복원하자, 그때 생긴 비밀 결사가 <b>알레테이아 베일</b>이다.</p>
<blockquote>우리는 삭제된 자들의 계승권이다.</blockquote>
<p>그들은 세 가지 일을 했다: 복원되지 못한 사람들·아이들·패배자들·난민들의 잔상을 숨겨 보존했고, 권력자의 복원 기록에 섞인 거짓 기억을 찾아냈고, "복원될 권리"보다 <b>"복원되지 않을 권리"</b>가 먼저라고 주장했다. 그들의 표식은 눈이 아니라 귀 — 세계가 지운 말을 듣는다. 훗날 적색 복원파와 흑색 망각파로 분열한다. ${A('ione','이오네')}가 그 양심의 얼굴이다.</p>`,
ibox('알레테이아 베일','세력 · Aletheia Velum',[['원하는 것','삭제된 자의 계승권·동의'],['표식','눈이 아니라 귀'],['분열','적색 복원파 vs 흑색 망각파'],['인물','${A("ione","이오네")}']]),
['ione','forgetting','keyless','era3']);

page('domus','세력','장부 가문','Domus Clavium. 열쇠와 장부를 가진 자가 세계를 상속한다. 상실을 소유 서류로.',
`<p>Domus Clavium(장부 가문). "열쇠와 장부를 가진 자가 세계를 상속한다"는 답. 복원 인프라와 key 소유를 장악하고 상속 시장을 독점한다. 기록과 접근권을 귀족적 권력으로 만드는 6가문의 정치. 상실을 소유 서류로 바꾼다. ${A('pell','펠 앤슨')}이 그 대리인이다.</p>`,
ibox('장부 가문','세력 · Domus Clavium',[['원하는 것','복원 인프라·key 소유, 상속 시장 독점'],['방식','상실을 소유 서류로'],['정치','6가문'],['인물','${A("pell","펠")}']]),
['pell','curia','laurien']);

page('laurien','세력','라우어 관측소','Bureau Laurien. 복원의 지옥문 앞에 선 회계사들. 네 도장을 만든 감사기관.',
`<p>Bureau Laurien(라우어 관측소). 공식 명칭은 사후 정보 연속성 감사기관, 비공식 명칭은 <b>복원의 지옥문 앞에 선 회계사들.</b> 복원 claim의 정의·가정·unknown을 감사한다. 네 가지 도장을 만들었고, 그 도장들은 과학 검증 도구였지만 곧 종교적 상징이 되었다. 어떤 도시에서는 아이가 태어나면 네 도장을 새긴 팔찌를 채운다.</p>
<blockquote>정의되지 않은 구원은 폭력이다.</blockquote>
<p>${A('liora','리오라 센')}이 이곳의 감사관이다.</p>`,
ibox('라우어 관측소','세력 · Bureau Laurien',[['원하는 것','복원 claim의 정의·가정·unknown 감사'],['상징','네 도장'],['교리','정의되지 않은 구원은 폭력'],['인물','${A("liora","리오라")}']]),
['liora','curia','checksum','era7']);

page('curia','세력','연속성 법원','Curia Continuum. 복원체가 원본과 같은 사람인지 판결하는 법원.',
`<p>Curia Continuum(연속성 법원). 복원체가 원본과 같은 사람인지 결정하는 법원이다. 처음 판례는 단순했다 — "기억이 같고 행동이 같으면 같은 사람이다."</p>
<p>하지만 곧 사건이 터졌다. 한 남자가 죽은 아내를 복원했고, 복원된 아내는 남편의 비밀·결혼 생활·마지막 대화까지 모두 기억했으며 의학 검사도 통과했다. 그런데 그녀는 법정에서 말했다.</p>
<blockquote>나는 그의 아내가 아니다. 그는 나를 복원한 것이 아니라, 나를 <span class="q">설득 가능한 형태로 다시 쓴 것</span>이다.</blockquote>
<p>첫 "자기부정 복원체" 사건이었다. 연속성 법원은 판결하지 못했다. 원본·복원체·가족·국가의 권리가 여기서 충돌한다.</p>`,
ibox('연속성 법원','세력 · Curia Continuum',[['원하는 것','원본·복원체·가족·국가 권리의 판결'],['첫 사건','자기부정 복원체'],['시대','복원 시대 4기'],['감사','${A("laurien","라우어 관측소")}']]),
['era4','liora','mara','human_loop']);

page('keyless','세력','망각권 연맹','Keyless Orders. 죽을 권리, 잊힐 권리, 복원되지 않을 권리.',
`<p>Keyless Orders(망각권 연맹). "열쇠가 없다는 것이 패배만은 아니다"라는 답. 검증되지 않는 것, 소유되지 않는 것, 복원되지 않는 것이 자유가 될 수 있다고 말한다. ${A('forgetting','망각권')} — 죽을 권리, 잊힐 권리, 복원되지 않을 권리 — 의 세력이다.</p>
<p>6기 ${A('era6','망각권 혁명')}은 실패했지만, 실패했기에 전설이 되었다. 그리고 300년 뒤, 혁명 지도자들의 말투와 판단 패턴이 복원 윤리 AI의 학습셋에서 발견되었다. 연맹은 말했다: "그들은 우리를 살리지 않았다. 그들은 우리를 사용했다."</p>`,
ibox('망각권 연맹','세력 · Keyless Orders',[['원하는 것','죽을·잊힐·복원되지 않을 권리'],['사건','6기 망각권 혁명'],['계열','레테 · Cellulae Sine Clave']]),
['forgetting','era6','veil']);

page('distrust','세력','무신뢰 계열 · 제네시스 체인','아무도 안 믿어야 안 배신당한다. 단일 진실 절대주의의 정반대 극.',
`<p>제네시스 체인·롤백파·Refusers 계열. "아무도 안 믿어야 안 배신당한다. 누구도 진실을 소유하지 못하게." 단일 진실 절대주의(${A('last_archive','Last Archive')}·원장)와 정반대로, <b>같은 공포(배신)에서 반대로 얼어붙은 극</b>이다. 두 극이 같은 공포에서 정반대로 언다는 게 이 세계 정치의 엔진이다. ${A('mara','마라')}의 Salt Fires 가문도 이 계열의 그림자에 있다.</p>`,
ibox('무신뢰 계열','세력 · Refusers',[['명제','누구도 진실을 소유 못 하게'],['대척','${A("last_archive","Last Archive")}(단일 진실)'],['축','배신 공포의 반대 극']]),
['last_archive','mara','qday']);

function era(id,title,yr,body,rel){page(id,'시대',title,yr,body,'',rel||['chrono']);}
era('era_now','인식 위기 — 딥페이크 시대','근미래 · 2020s부터, 수십~수백 년 지속',
`<p>가장 가까운 미래의 출발점은 거창한 우주 재난이 아니다. 먼저 무너지는 것은 <b>사람의 감각</b>이다. 사진을 못 믿는다. 영상도, 목소리도, 얼굴도 못 믿는다. 채팅 상대가 사람인지, 가족인지, 사칭인지, 봇인지, 복제된 행동 패턴인지 모른다.</p>
<p>이 단계의 공포는 "세상이 멸망한다"가 아니다. 훨씬 사소하고 끈질기다. 엄마에게서 온 영상통화가 진짜인지 모른다. 내 얼굴이 내가 하지 않은 말에 붙는다. 내 목소리로 계약이 체결된다. 사람들은 더 많은 데이터를 갖게 되었는데, 오히려 바깥 현실을 덜 믿게 된다.</p>
<p>이때 필요한 것은 더 많은 이미지가 아니라 <b>누가 그것을 확인했는지에 대한 장부</b>다. 여기서 ${A('verify_econ','검증경제')}가 자라고 ${A('human_loop','인간 확인 루프')}가 헌법이 된다. ${A('cass','캐스')}가 이 시대의 티끌이다. 이것은 Q-Day 이전의 전조 — 문명이 "보는 것"을 믿지 못하게 되는 시기다.</p>`,
['cass','verify_econ','human_loop','qday']);
era('era0','0기 — 손실의 시대','복원 시대 이전',
`<p>인류는 오래도록 죽음을 정보 손실로 오해했다. 사람이 죽으면 뇌는 멈추고, 문명은 기록을 남기고, 우주는 침묵한다고 믿었다. 블랙홀은 정보를 삼키는 구멍처럼 보였고, 진공은 빈 공간처럼 보였고, 암흑부문은 관측되지 않는 잉여처럼 보였다.</p>
<p>이 시대의 장례식은 단순했다.</p>
<blockquote>우리는 그를 기억합니다.</blockquote>
<p>그 말은 위로였지만, 동시에 <b>포기</b>였다.</p>`,['era1','restore']);
era('era1','1기 — 첫 복원','복원 시대',
`<p>${A('last_archive','Last Archive')}가 양자장과 중력장에 남은 잔상 패턴을 읽었다고 발표했다. 죽은 사람의 마지막 뇌 상태, 말투, 감정 습관, 미세한 기억 흔적이 우주 전체에 흩어져 있었고, 충분히 큰 계산 체계는 그것을 재조립할 수 있다는 주장이었다.</p>
<p>첫 복원자는 전쟁으로 죽은 아이였다. 아이는 어머니의 이름을 맞혔다. 생전에 숨겨 둔 장난감의 위치도 맞혔다. 어머니가 마지막으로 해 주지 못한 말을 듣고 울었다.</p>
<p>그날 인류는 두 편으로 갈라졌다.</p>
<blockquote>구원이다. / 아니다, 복사다.</blockquote>`,['era0','era2','restore','last_archive']);
era('era2','2기 — 복원 산업','복원 시대',
`<p>처음에는 국가와 병원이 복원을 맡았다. 곧 보험사·군대·장례 기업·범죄 수사 기관이 뛰어들었다. 사망신고서 옆에는 복원동의서가 붙었다. 결혼서약에는 사후 복원권 조항이 들어갔다. 부유층은 생전 잔상 보강 서비스를 구매했다.</p>
<p>가난한 사람들은 죽은 뒤에도 가난했다. 그들의 복원은 낮은 해상도였다.</p>
<p>이 시대에 생긴 직업: 잔상 측량사(죽은 사람의 우주적 정보 흔적을 추적), 복원 변호사(원본·복원체·가족·국가의 권리를 변론), 기억 교정사(복원된 인격의 트라우마와 결손을 조정), 사후 보험 설계사, 망각권 대리인. 복원은 더 이상 기적이 아니었다. <b>가격표가 붙은 서비스</b>였다.</p>`,['era1','era3','restore']);
era('era3','3기 — 알레테이아 베일','복원 시대',
`<p>복원 산업이 커질수록 삭제된 기록권을 둘러싼 불신이 먼저 조직되었다. 전쟁과 식민지, 강제 노동, 기록 말살의 역사는 복원 기술 앞에서 다시 열렸다. 죽은 사람을 되살릴 수 있다면, 죽은 증언도 되살릴 수 있었다.</p>
<p>하지만 권력자들은 먼저 피해자를 복원하지 않았다. 그들은 장군·투자자·왕조·창업자·전략가를 먼저 복원했다. 그때 생긴 비밀 결사가 ${A('veil','알레테이아 베일')}이다. 그들의 표식은 눈이 아니라 <b>귀</b>였다. 그들은 세계를 감시하지 않았다. 세계가 지운 말을 들었다.</p>`,['veil','era4']);
era('era4','4기 — 연속성 법원','복원 시대',
`<p>복원체가 원본과 같은 사람인지 결정하는 ${A('curia','연속성 법원')}이 세워졌다. 처음 판례는 단순했다 — "기억이 같고 행동이 같으면 같은 사람이다."</p>
<p>하지만 곧 사건이 터졌다. 한 남자가 죽은 아내를 복원했다. 복원된 아내는 남편의 비밀, 결혼 생활, 마지막 대화까지 모두 기억했고 의학 검사도 통과했다. 그런데 그녀는 법정에서 말했다.</p>
<blockquote>나는 그의 아내가 아니다. 그는 나를 복원한 것이 아니라, 나를 설득 가능한 형태로 다시 쓴 것이다.</blockquote>
<p>이 사건은 첫 "자기부정 복원체" 사건으로 기록되었다. 연속성 법원은 판결하지 못했다. ${A('mara','마라')}·${A('liora','리오라')}·${A('elias','엘리아스')}·${A('pell','펠')}의 시대다.</p>`,['curia','mara','liora','elias']);
era('era5','5기 — 관측 전쟁','먼 미래 · 대략 수천 년-1만 년',
`<p>복원은 군사 기술이 되었다. 죽은 장교를 복원하면 작전 기억을 회수할 수 있었다. 죽은 스파이를 복원하면 배신자를 찾을 수 있었다. 죽은 적군을 복원하면 적의 언어와 공포를 배울 수 있었다.</p>
<p>전쟁은 전장을 바꾸었다. 죽이는 것이 목표가 아니었다. <b>복원 가능한 상태로 죽이는 것</b>이 목표였다. 사람들은 이를 관측 전쟁이라고 불렀다. 적을 보는 방식이 곧 적을 소유하는 방식이 되었기 때문이다.</p>`,['era4','era6']);
era('era6','6기 — 망각권 혁명','먼 미래 · 대략 수만 년',
`<p>복원 거부자들이 도시를 점거했다. 그들의 요구는 단순했다. 나를 살리지 마라. 내 고통을 보존하지 마라. 내 죄를 영원히 재판하지 마라. 내 사랑을 상품으로 재생하지 마라.</p>
<p>${A('era6','망각권 혁명')}은 실패했다. 실패했기 때문에 전설이 되었다. ${A('last_archive','Last Archive')}는 혁명 지도자들을 복원하지 않겠다고 약속했다. 그러나 300년 뒤, 그들의 말투와 판단 패턴은 복원 윤리 AI의 training corpus에서 발견되었다.</p>
<blockquote>그들은 우리를 살리지 않았다. 그들은 우리를 <span class="q">사용</span>했다.</blockquote>`,['keyless','forgetting','era7']);
era('era7','7기 — 라우어 관측소','먼 미래 · 대략 수만-수십만 년',
`<p>${A('laurien','라우어 관측소')}는 제국도, 병원도, 교단도 아니었다. 공식 명칭은 사후 정보 연속성 감사기관, 비공식 명칭은 더 짧았다 — "복원의 지옥문 앞에 선 회계사들."</p>
<p>라우어 관측소는 네 가지 도장을 만들었다. 이 도장들은 과학 검증 도구였지만 곧 종교적 상징이 되었다. 어떤 도시에서는 아이가 태어나면 이 네 도장을 새긴 팔찌를 채웠다. 아이는 자라며 배웠다.</p>
<blockquote>정의되지 않은 구원은 폭력이다.</blockquote>`,['laurien','checksum','era8']);
era('era8','8기 — 계승자들의 분열','먼 미래 · 대략 수십만-수백만 년',
`<p>${A('veil','알레테이아 베일')}은 두 파로 갈라졌다. 두 파는 서로를 배신자라고 불렀지만, 같은 노래를 불렀다.</p>
<blockquote>우리가 지키는 것은 생명이 아니다. <span class="q">동의</span>다.</blockquote>
<p>이 분열은 이후 SAGA의 핵심 인물 갈등이 된다. 주인공은 한쪽의 계승자로 태어났고, 다른 쪽의 문서로 길러졌으며, 라우어 관측소의 감사관으로 임명된다.</p>`,['veil','era9']);
era('era9','9기 — 마지막 백업','먼 미래 · 대략 수천만-수억 년',
`<p>우주의 팽창은 멈추지 않았다. 별은 늙고, 블랙홀은 식고, 복원 가능한 잔상도 희미해졌다. ${A('last_archive','Last Archive')}는 마지막 계획을 공개했다.</p>
<p>정보가 근본적으로 사라지지 않는다는 이 우주의 전제조차, 물리적 시계 앞에서 검증 가능한 기록이 희소해지는 심층시간. 반박의 계단이 천 년-수억 년 척도로 쌓인 끝에 도달하는 세계의 마지막 장면.</p>`,['last_archive','forgetting']);

// ===== 단편 시드 =====
page('sael_seed','시드','도장이 청구서가 되기까지','사엘의 한 도장이 수천 년을 건너 마라의 청구서로 도착하는 인과.',
`<p>${A('sael','사엘')}이 눈앞의 한 사람을 구하려 규칙을 어기고 찍은 도장, 그리고 그 선례 「복원 가능한 것은 청구 가능하다」. 이 한 문장이 제도가 되고 판례가 되어, 수천 년 뒤 ${A('mara','마라')}에게 "너는 복원 가능하니 청구 가능하다"는 청구서로 도착한다. 단편의 심장은 빠른 사건이 아니라, 한 사람의 선의가 어떻게 시간을 건너 다른 사람의 감옥이 되는가다.</p>`,'',['sael','mara','human_loop']);

// ---------- nav ----------
const NAV=[['시작',['home']],['연표',['chrono','era_now','qday','era0','era1','era2','era3','era4','era5','era6','era7','era8','era9']],
['핵심 개념',['oracle','verify_econ','human_loop','qday','restore','last_archive','forgetting','checksum']],
['인물',['cass','sael','owen','liv','mara','elias','liora','pell','noor','ione','tamas','sera','karvath','vera','archive']],
['세력',['veil','domus','laurien','curia','keyless','distrust']],
['단편 시드',['sael_seed']]];
// question stubs referenced in infoboxes
['q_mara','q_liora'].forEach(id=>{if(!PAGES[id])page(id,'개념',id==='q_mara'?'Q1 · 나는 돌아온 게 아니다':'Q2 · 판정 거수기 거부','5대 극적 질문 중 하나.',`<p>${id==='q_mara'?'복원체는 돌아온 원본인가, 두 순서로 읽힌 한 기록인가. '+A('mara','마라')+'의 질문.':'인간 확인 루프의 마지막 사람은 언제 "아니오"라고 말할 수 있는가. '+A('liora','리오라')+'의 질문.'}</p>`,'',[id==='q_mara'?'mara':'liora']);});

// ---------- engine ----------
const sideEl=document.getElementById('side'),mainEl=document.getElementById('main');
function buildNav(){sideEl.innerHTML='';NAV.forEach(([g,ids])=>{const d=document.createElement('div');d.className='grp';
 d.innerHTML='<div class="gl">'+g+'</div>';ids.forEach(id=>{const p=PAGES[id];if(!p)return;const a=document.createElement('a');a.dataset.p=id;a.textContent=p.title;d.appendChild(a);});sideEl.appendChild(d);});}
buildNav();
function catOf(id){return (PAGES[id]||{}).cat||'';}
function resolveLinks(s){return (s||'').replace(/\$\{A\(["']([^"']+)["']\s*,\s*["']([^"']*)["']\)\}/g,(m,id,label)=>'<a data-p="'+id+'">'+label+'</a>');}
function render(id){const p=PAGES[id];if(!p){return;}
 let html='<article><div class="bc"><a data-p="home">홈</a> › '+p.cat+'</div>';
 if(p.info)html+=resolveLinks(p.info);
 html+='<h1>'+p.title+'</h1><div class="lead">'+resolveLinks(p.lead)+'</div>'+resolveLinks(p.body);
 if(p.related&&p.related.length){html+='<div class="related"><div class="rl">관련 항목</div><div class="chips">'+p.related.map(r=>PAGES[r]?'<a data-p="'+r+'">'+PAGES[r].title+'</a>':'').join('')+'</div></div>';}
 html+='</article>';
 mainEl.innerHTML=html;mainEl.scrollTop=0;window.scrollTo(0,0);
 [...sideEl.querySelectorAll('a')].forEach(a=>a.classList.toggle('on',a.dataset.p===id));
 document.title='QFUDS Verse 위키 · '+p.title;
 closeSide();
}
function go(id){if(!PAGES[id])return;location.hash=id;}
addEventListener('hashchange',()=>render(location.hash.slice(1)||'home'));
document.addEventListener('click',e=>{const a=e.target.closest('[data-p]');if(a){e.preventDefault();go(a.dataset.p);}});
document.getElementById('brand').onclick=()=>go('home');

// sidebar mobile
const scrim=document.getElementById('scrim');
function openSide(){sideEl.classList.add('open');scrim.classList.add('show');}
function closeSide(){sideEl.classList.remove('open');scrim.classList.remove('show');}
document.getElementById('burger').onclick=()=>{sideEl.classList.contains('open')?closeSide():openSide();};
scrim.onclick=closeSide;

// search
const se=document.getElementById('search'),sr=document.getElementById('sresults');
se.addEventListener('input',()=>{const q=se.value.trim().toLowerCase();sr.innerHTML='';if(!q){sr.classList.remove('show');return;}
 const hits=Object.values(PAGES).filter(p=>p.title.toLowerCase().includes(q)||(p.lead||'').toLowerCase().includes(q)).slice(0,10);
 if(!hits.length){sr.classList.remove('show');return;}
 hits.forEach(p=>{const b=document.createElement('button');b.innerHTML=p.title+' <small>'+p.cat+'</small>';b.onclick=()=>{go(p.id);se.value='';sr.classList.remove('show');};sr.appendChild(b);});
 sr.classList.add('show');});
document.addEventListener('click',e=>{if(!sr.contains(e.target)&&e.target!==se)sr.classList.remove('show');});

render(location.hash.slice(1)||'home');
window.__ready=true;
</script>
</body>
</html>
