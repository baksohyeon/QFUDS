<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>QFUDS SAGA — 세계관 지식 그래프</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04050b;--ink:#eef1f7;--muted:#98a0b6;--line:rgba(150,170,220,.18);
    --core:#ffd166;--chain:#4dd6c1;--lens:#7aa5ff;--story:#ffa24d;--question:#c77dff;
    --character:#7ae582;--faction:#f2555c;--domain:#ff7a9c;--seed:#ffcf5c;--time:#cfd6e6;--hub:#8892a8;
    --panel:rgba(10,13,24,.94);--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:"Noto Sans KR",system-ui,sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;overscroll-behavior:none}
  #scene{position:fixed;inset:0}#scene canvas{touch-action:none;display:block}
  .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;color:#c7cde0;line-height:1.7}
  .label{font-size:11px;font-weight:700;color:#e6eaf4;text-shadow:0 0 6px rgba(0,0,0,.95),0 0 2px #000;padding:2px 6px;border-radius:999px;background:rgba(7,9,16,.42);white-space:nowrap;pointer-events:none;transition:opacity .18s}
  .label.hasnote::after{content:" ✎";color:var(--core);font-weight:900}

  #topbar{position:fixed;top:0;left:0;right:0;z-index:7;display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:calc(9px + var(--safe-t)) 12px 9px;background:linear-gradient(180deg,rgba(4,5,11,.85),rgba(4,5,11,0));pointer-events:none}
  #topbar .title{font-family:"Noto Serif KR",serif;font-size:14px;font-weight:700;text-shadow:0 1px 8px #000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #topbar .right{display:flex;align-items:center;gap:6px;pointer-events:auto;flex-shrink:0}
  #topbar .prog{font-size:11.5px;color:#c7cde0;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 9px;backdrop-filter:blur(8px)}
  #topbar .prog b{color:var(--core)}
  .tb{font-size:12px;font-weight:700;font-family:inherit;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 12px;cursor:pointer;backdrop-filter:blur(8px);min-height:34px;white-space:nowrap}
  .tb:active{transform:scale(.95)}

  #tray{position:fixed;top:calc(50px + var(--safe-t));left:12px;right:12px;z-index:7;max-width:600px;margin:0 auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 13px;backdrop-filter:blur(12px);
    transform:translateY(-14px);opacity:0;pointer-events:none;transition:.24s;max-height:74vh;overflow:auto}
  #tray.open{transform:none;opacity:1;pointer-events:auto}
  #tray .grp{margin-bottom:12px}#tray .grp:last-child{margin-bottom:0}
  #tray .lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px}
  #search{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:10px 12px;outline:none}
  #search::placeholder{color:#6b7488}
  #sresults{margin-top:7px;display:flex;flex-direction:column;gap:4px}
  #sresults button{text-align:left;font-family:inherit;font-size:12.5px;color:#dbe0ee;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer}
  #sresults button b{color:#fff}
  #tray .row{display:flex;gap:7px;flex-wrap:wrap}
  #tray .row button{flex:1;min-width:120px;font-family:inherit;font-size:12px;color:#dbe0ee;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:9px;cursor:pointer;min-height:34px}
  #tray .row button:active{transform:scale(.97)}

  #toast{position:fixed;left:50%;transform:translateX(-50%) translateY(12px);bottom:calc(18px + var(--safe-b));z-index:9;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:12.5px;color:#dbe0ee;backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:.3s;text-align:center;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  #panel{position:fixed;top:0;right:0;height:100%;width:min(440px,100vw);z-index:10;background:var(--panel);border-left:1px solid var(--line);backdrop-filter:blur(14px);transform:translateX(105%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;padding:calc(20px + var(--safe-t)) 22px calc(18px + var(--safe-b))}
  #panel.open{transform:translateX(0)}
  #panel .kicker{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:7px}
  #panel h2{font-family:"Noto Serif KR",serif;font-size:23px;margin:0 0 5px;line-height:1.2}
  #panel .sub{font-size:12px;color:var(--muted);margin:0 0 14px}
  #panel .body{font-size:15px;line-height:1.9;color:#e2e7f2;overflow-y:auto;padding-right:6px;flex:1;min-height:34vh;-webkit-overflow-scrolling:touch}
  #panel .body p{margin:0 0 11px}
  #panel .body .q{position:relative;padding:10px 12px;border-left:2px solid currentColor;border-radius:0 8px 8px 0;margin:12px 0;background:rgba(255,255,255,.035);font-family:"Noto Serif KR",serif;font-size:15px;color:#fff}
  #panel .body .q::before{content:"파고드는 질문";display:block;font-size:9.5px;letter-spacing:.13em;font-weight:700;opacity:.85;margin-bottom:4px;font-family:"Noto Sans KR"}
  #panel .body .why{position:relative;padding:10px 12px;border-left:2px solid currentColor;border-radius:0 8px 8px 0;margin:12px 0;background:rgba(255,255,255,.035)}
  #panel .body .why::before{content:"왜 이렇게 되나";display:block;font-size:9.5px;letter-spacing:.13em;font-weight:700;opacity:.85;margin-bottom:4px}
  #panel .sec{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:14px 0 7px}
  #panel .chips{display:flex;flex-wrap:wrap;gap:5px}
  #panel .chips span{font-size:10.5px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 9px}
  #panel .chips span.link{color:#cbd2e6;cursor:pointer;border-color:rgba(150,170,220,.4)}
  #panel .chips span.link:active{background:rgba(255,255,255,.08)}
  #panel .conns{display:flex;flex-direction:column;gap:5px}
  #panel .conns button{display:flex;align-items:center;gap:8px;text-align:left;font-family:inherit;font-size:13px;color:#e6eaf4;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer}
  #panel .conns button:active{background:rgba(255,255,255,.09)}
  #panel .conns button .d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px currentColor;flex-shrink:0}
  #panel .conns button .plus{margin-left:auto;color:var(--core);font-weight:900}
  #panel .note-wrap{margin-top:13px}
  #panel .note-lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
  #panel .note-lbl span{color:var(--core);letter-spacing:0;text-transform:none;font-weight:500}
  #panel #pnote{width:100%;min-height:56px;resize:vertical;font-family:inherit;font-size:13px;color:var(--ink);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none;line-height:1.6}
  #panel .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
  #panel .toggles{display:flex;gap:7px;margin-top:12px}
  #panel .toggles button{flex:1;font-family:inherit;font-size:12px;font-weight:700;color:#cbd2e6;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;padding:8px;cursor:pointer;min-height:34px}
  #panel .toggles button.on{background:rgba(255,209,102,.14);border-color:var(--core);color:var(--core)}
  #panel .collapse{max-height:0;overflow:hidden;transition:max-height .25s}
  #panel .collapse.open{max-height:44vh;overflow:auto;margin-top:8px}
  #panel .conns button{align-items:flex-start;flex-direction:column;gap:2px}
  #panel .conns button .cn{display:flex;align-items:center;gap:8px;font-weight:700}
  #panel .conns button .cs{font-size:11px;color:var(--muted);font-weight:400;padding-left:17px;line-height:1.4}
  #panel .pnav{display:flex;gap:8px;margin-top:12px;flex-shrink:0}
  #panel .pnav button{flex:1;font-family:inherit;font-size:14px;font-weight:700;color:#04050b;background:var(--core);border:0;border-radius:12px;padding:14px;cursor:pointer;min-height:48px}
  #panel .pnav button.sec{background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--line);flex:0 0 34%}
  #panel .pnav button:active{transform:scale(.97)}
  #panel .swipehint{text-align:center;font-size:10.5px;color:var(--muted);margin-top:10px}
  #panel .close{position:absolute;top:calc(12px + var(--safe-t));right:16px;width:36px;height:36px;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:10px;cursor:pointer;font-size:16px}
  #panel .close:active{background:rgba(255,255,255,.08)}

  #intro{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,rgba(20,30,55,.75),rgba(4,5,11,.98));backdrop-filter:blur(4px);transition:opacity .6s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro .card{max-width:600px;text-align:center;padding:0 26px}
  #intro .eyebrow{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--core);font-weight:700;margin-bottom:13px}
  #intro h1{font-family:"Noto Serif KR",serif;font-size:clamp(26px,5.4vw,44px);margin:0 0 15px;line-height:1.15}
  #intro p{font-size:14px;line-height:1.8;color:#c7cde0;margin:0 auto 11px;max-width:500px}
  #intro .go{margin-top:22px;padding:13px 32px;font-size:15px;font-weight:700;font-family:inherit;color:#04050b;background:var(--core);border:0;border-radius:999px;cursor:pointer;box-shadow:0 0 30px rgba(255,209,102,.4)}
  #intro .go:active{transform:scale(.97)}
  #intro .note{margin-top:16px;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div id="scene"></div>
<div id="topbar">
  <div class="title">QFUDS SAGA 지식그래프</div>
  <div class="right">
    <span class="prog">발견 <b id="pcount">0</b>/<span id="ptotal">0</span></span>
    <button class="tb" id="btnFilter">메뉴</button>
    <button class="tb" id="btnHelp">?</button>
  </div>
</div>
<div id="tray">
  <div class="grp"><div class="lbl">검색</div><input id="search" placeholder="인물·개념·시대·시드 검색"><div id="sresults"></div></div>
  <div class="grp"><div class="lbl">이동</div><div class="row"><button id="btnPath">처음부터 연표 따라가기</button><button id="btnReset">코어로 리셋</button></div></div>
  <div class="grp"><div class="lbl">메모</div><div class="row"><button id="noteExport">CSV 내보내기</button><button id="noteImport">CSV 가져오기</button><input type="file" id="noteFile" accept=".csv" style="display:none"></div></div>
</div>
<div id="toast"></div>
<div id="panel">
  <button class="close" id="pclose">✕</button>
  <div class="kicker" id="pkicker"></div>
  <h2 id="ptitle"></h2>
  <p class="sub" id="psub"></p>
  <div class="body" id="pbody"></div>
  <div class="chips" id="pchips"></div>
  <div class="toggles">
    <button id="tgConn">관련 좌표</button>
    <button id="tgNote">메모</button>
  </div>
  <div id="connWrap" class="collapse"><div class="conns" id="pconns"></div></div>
  <div id="noteWrap" class="collapse"><textarea id="pnote" placeholder="이 좌표 메모 (자동 저장). 단편감·아직 안 정한 선택지 적어두면 돼요."></textarea><div class="note-lbl" style="margin-top:6px"><span id="pnotestate"></span></div></div>
  <div class="pnav">
    <button class="sec" id="pPrev">← 이전</button>
    <button id="pNext">다음 →</button>
  </div>
</div>
<div id="intro">
  <div class="card">
    <div class="eyebrow">SAGA · 세계관 온보딩</div>
    <h1>2026년,<br>한 사람의 얼굴이 도둑맞는다</h1>
    <p>어렵게 시작하지 않아요. 캐스라는 한 사람의 이야기에서 출발해, "다음 →"만 누르면 딥페이크 2026부터 먼 미래 9기 마지막 백업까지, 세계관 상세 연표가 인물·단편 시드와 함께 순서대로 이어집니다.</p>
    <p>중간중간 인물·단편 시드가 등장하고, 더 파고들고 싶으면 "관련 좌표"로 옆길로 새도 돼요.</p>
    <button class="go" id="start">이야기로 시작</button>
    <div class="note">이 설정집을 하나의 정본(canon)으로 놓고 탐사합니다.</div>
  </div>
</div>

<script>
window.addEventListener('load',function(){setTimeout(function(){if(!window.__ready){
  var s=document.getElementById('scene');if(s)s.innerHTML='<div class="fallback">3D 엔진을 불러오지 못했습니다.<br>최신 Safari 또는 Chrome 브라우저로 열어 주세요.</div>';
  var i=document.getElementById('intro');if(i)i.style.display='none';}},4500);});
</script>
<script type="importmap">

</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const COLOR={core:0xffd166,chain:0x4dd6c1,lens:0x7aa5ff,story:0xffa24d,question:0xc77dff,character:0x7ae582,faction:0xf2555c,domain:0xff7a9c,seed:0xffcf5c,time:0xcfd6e6,hub:0x8892a8};
const KICK={core:'중심 질문',chain:'세계관 인과 사슬',lens:'사회물리학',story:'스토리 아크',question:'극적 질문',character:'인물',faction:'세력',domain:'세계-체계 도메인',seed:'단편 시드',time:'타임라인',hub:'묶음'};
const P=x=>({t:'p',x}),W=x=>({t:'why',x}),Q=x=>({t:'q',x});
const nd=(id,cat,name,sub,body,canon)=>({id,cat,name,sub,body:body||[],canon:canon||[]});

const NODES=[
 nd('sun','core','오라클 문제','바깥 현실을 누가 보증하는가',[P('블록체인은 자기 안은 검증하지만 바깥 현실은 스스로 알지 못한다. 그 외부 사실을 "믿어도 된다"고 말해 주는 장치가 오라클이다.'),P('QFUDS는 이 문제를 체인 밖으로 꺼낸다. 문명 전체가 바깥 현실을 못 믿게 되고, 보증하는 자가 권력이 된다.'),Q('누가 바깥 현실을 보증하는가. 그리고 그 보증자를 누가 다시 보증하는가.')],['fiction_v2']),
 nd('c0','chain','딥페이크 현재','보는 것이 믿는 것이 아니게 된 지금',[P('딥페이크·AI 생성물이 영상·음성·신원의 진위를 죽인다. 2026년, 독자가 지금 사는 현실. 진입점은 캐스 한 사람.'),W('기본값이 뒤집힌다. "영상은 실제 기록"이 "모든 것은 생성 가능, 사람이 보증하기 전까진"으로.'),Q('보는 것이 곧 믿는 것이 아니게 되면, 무엇이 마지막까지 남는가.')],['039','005']),
 nd('c1','chain','최후의 앵커','다 위조돼도 암호 하나는 못 깬다',[P('영상도 신원도 위조되자 문명은 위조 불가한 것 하나에 매달린다. 암호 서명과 불변 원장. 제3자를 없앤 구조가 최후의 공증인이 된다.'),Q('마지막으로 매달릴 바닥이 수학이라면, 그 바닥은 영원히 안전한가.')],['039 §3','017']),
 nd('c2','chain','검증경제의 필연','진짜가 예외가 되는 사회',[P('"이거 진짜야?"에 답하는 일이 산업이 된다. Aletheia Velum 같은 검증 권력이 등장.'),W('위조 하나가 파국을 부르자 법이 출처 증명을 요구하고(책임 연쇄), 위조 못 하는 유일한 신호가 사람의 유한한 주목이라 그게 희소재가 된다. COVID처럼 충격은 기본값을 뒤집고 안 돌아간다.'),Q('진짜가 예외가 된 사회에서, 진짜가 되는 비용은 누가 감당하는가.')],['027','026']),
 nd('c3','chain','인간 확인 루프','이 세계의 헌법',[P('기계는 계산·생성하지만 "무엇이 진짜였나"의 최종 판정은 사람이 비준해야 효력이 생긴다. 도장·seal은 편집 불가능성을 만드는 설계다.'),Q('한 사람의 도장이 만든 선례를, 다음 세대는 거절할 수 있는가.')],['020','1.5부']),
 nd('c4','chain','Q-Day','최후의 바닥마저 소급 붕괴',[P('미래 거래는 양자내성 암호로 지켜도 옛 앵커에 묶인 심층 기록은 소급 교체가 안 된다. 먼 미래 양자가 그 옛 바닥을 깬다. 암호는 처음엔 구원, 끝엔 재앙.'),Q('과거의 진짜성이 흔들리면, 과거는 이제 누구의 것인가.')],['039','002']),

function reveal(rec,near){if(rec.revealed)return;rec.revealed=true;rec.group.visible=true;

function parseCSV(t){const rows=[];let i=0,f='',row=[],q=false;while(i<t.length){const c=t[i];if(q){if(c==='"'){if(t[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=c;i++;continue;}if(c==='"'){q=true;i++;continue;}if(c===','){row.push(f);f='';i++;continue;}if(c==='\n'||c==='\r'){if(c==='\r'&&t[i+1]==='\n')i++;row.push(f);rows.push(row);row=[];f='';i++;continue;}f+=c;i++;}if(f.length||row.length){row.push(f);rows.push(row);}return rows;}
document.getElementById('noteExport').onclick=()=>{let csv='name,note\n';Object.keys(notes).forEach(k=>{csv+='"'+k.replace(/"/g,'""')+'","'+String(notes[k]).replace(/"/g,'""')+'"\n';});const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='qfuds_notes.csv';a.click();setTimeout(()=>URL.revokeObjectURL(u),1000);showToast('메모 '+Object.keys(notes).length+'개 내보냈어요',3000);};

function chipTarget(chip,exclude){for(const n of NODES){if(n.id===exclude)continue;if((n.canon||[]).some(c=>c===chip))return recs[n.id];}return null;}

function flyTo(rec){const target=rec.pos.clone();const dist=rec.radius*7+26;const dir=camera.position.clone().sub(controls.target).normalize();
 flying={fromCam:camera.position.clone(),toCam:target.clone().add(dir.multiplyScalar(dist)),fromT:controls.target.clone(),toT:target,t:0};}

panel.addEventListener('touchend',e=>{if(sx===null||!current)return;const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;sx=null;

// core path tour
document.getElementById('btnPath').onclick=()=>{tray.classList.remove('open');reveal(recs['sun']);tourIndex=0;goTo(recs[TOUR[0]]);showToast('상세 연표를 처음부터. "다음 →"만 누르면 딥페이크 2026에서 9기 마지막 백업까지 쭉 이어져요.',5500);};
document.getElementById('btnReset').onclick=()=>{revealed.slice().forEach(r=>{if(r.id!=='sun'){r.revealed=false;r.group.visible=false;}});revealed.length=0;recs['sun'].revealed=true;revealed.push(recs['sun']);revealNeighbors(recs['sun']);panel.classList.remove('open');current=null;controls.autoRotate=true;flying={fromCam:camera.position.clone(),toCam:new THREE.Vector3(0,20,120),fromT:controls.target.clone(),toT:new THREE.Vector3(0,0,0),t:0};tray.classList.remove('open');};

// tap
const ray=new THREE.Raycaster(),m=new THREE.Vector2(),proj=new THREE.Vector3();let tap=null;
function pickAt(x,y,rad){m.x=(x/innerWidth)*2-1;m.y=-(y/innerHeight)*2+1;ray.setFromCamera(m,camera);
 const hits=ray.intersectObjects(revealed.map(r=>r.hit),false);if(hits.length)return recs[hits[0].object.userData.id];
 let best=null,bd=rad;revealed.forEach(r=>{proj.copy(r.pos).project(camera);if(proj.z>1)return;const sxp=(proj.x*.5+.5)*innerWidth,syp=(-proj.y*.5+.5)*innerHeight;const dd=Math.hypot(sxp-x,syp-y);if(dd<bd){bd=dd;best=r;}});return best;}
renderer.domElement.addEventListener('pointerdown',e=>{tap={x:e.clientX,y:e.clientY,t:performance.now()};});
renderer.domElement.addEventListener('pointerup',e=>{if(!tap)return;const dx=e.clientX-tap.x,dy=e.clientY-tap.y,dt=performance.now()-tap.t;tap=null;if(Math.hypot(dx,dy)>14||dt>600)return;const rec=pickAt(e.clientX,e.clientY,e.pointerType==='mouse'?26:46);if(rec)openNode(rec);else if(panel.classList.contains('open')){panel.classList.remove('open');current=null;controls.autoRotate=true;}});

document.getElementById('start').onclick=()=>{document.getElementById('intro').classList.add('hide');reveal(recs['sun']);tourIndex=0;goTo(recs['cass']);showToast('아래 "다음 →"만 눌러도 스토리부터 세계관까지 순서대로 안내해요.',5500);};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);lr.setSize(innerWidth,innerHeight);});

// force sim + render
const tmp=new THREE.Vector3();const REP=520,REST=30,SPRING=0.045,CENTER=0.004,DAMP=0.86,DT=0.55;
function sim(){const R=revealed;for(const n of R)n.acc.set(0,0,0);
 for(let i=0;i<R.length;i++)for(let j=i+1;j<R.length;j++){const a=R[i],b=R[j];tmp.subVectors(a.pos,b.pos);let d2=tmp.lengthSq();if(d2<1)d2=1;const f=REP/d2;tmp.normalize().multiplyScalar(f);a.acc.add(tmp);b.acc.sub(tmp);}
 for(const e of edges){if(!e.a.revealed||!e.b.revealed)continue;tmp.subVectors(e.a.pos,e.b.pos);const d=tmp.length()||0.01;const f=-SPRING*(d-REST)/d;tmp.multiplyScalar(f);e.a.acc.add(tmp);e.b.acc.sub(tmp);}
 for(const n of R){if(n.id==='sun'){n.pos.set(0,0,0);n.group.position.set(0,0,0);continue;}if(n===current){n.acc.multiplyScalar(0.2);}
  n.acc.addScaledVector(n.pos,-CENTER);n.vel.add(n.acc.multiplyScalar(DT)).multiplyScalar(DAMP);n.pos.addScaledVector(n.vel,DT);n.group.position.copy(n.pos);}}
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();sim();
 revealed.forEach((n,i)=>{const tgt=(n===current)?1.35:1;n.mesh.scale.setScalar(n.mesh.scale.x+(tgt-n.mesh.scale.x)*0.15);
  n.mesh.material.emissiveIntensity=0.5+(n===current?0.4:0)+Math.sin(t*1.4+i)*0.05;
  if(n.pulse){n.glow.scale.setScalar(n.radius*6*(1+n.pulse*0.7));n.pulse*=0.9;if(n.pulse<0.02)n.pulse=0;}
  const dd=camera.position.distanceTo(n.pos);n.el.style.opacity=dd>340?'0':(dd>230?'0.4':'');});
 edges.forEach(e=>{const v=e.a.revealed&&e.b.revealed;e.line.visible=v;if(!v)return;const p=e.geo.attributes.position.array;p[0]=e.a.pos.x;p[1]=e.a.pos.y;p[2]=e.a.pos.z;p[3]=e.b.pos.x;p[4]=e.b.pos.y;p[5]=e.b.pos.z;e.geo.attributes.position.needsUpdate=true;});
 if(flying){flying.t=Math.min(1,flying.t+0.025);const e=1-Math.pow(1-flying.t,3);camera.position.lerpVectors(flying.fromCam,flying.toCam,e);controls.target.lerpVectors(flying.fromT,flying.toT,e);if(flying.t>=1)flying=null;}
 controls.update();renderer.render(scene,camera);lr.render(scene,camera);}
animate();window.__ready=true;
</script>
</body>
</html>
