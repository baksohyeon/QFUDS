<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>QFUDS SAGA — 세계관 갤럭시 탐사</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04050b;--ink:#eef1f7;--muted:#98a0b6;--line:rgba(150,170,220,.18);
    --core:#ffd166;--chain:#4dd6c1;--lens:#7aa5ff;--domain:#ff7a9c;--story:#ffa24d;
    --question:#c77dff;--character:#7ae582;--seed:#d8c48f;--time:#cfd6e6;--panel:rgba(10,13,24,.92);
    --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans KR",system-ui,sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;overscroll-behavior:none}
  #scene{position:fixed;inset:0}
  #scene canvas{touch-action:none;display:block}
  .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:32px;color:#c7cde0;line-height:1.7}
  .label{font-size:11.5px;font-weight:700;color:#e6eaf4;text-shadow:0 0 6px rgba(0,0,0,.95),0 0 2px #000;
    padding:2px 6px;border-radius:999px;background:rgba(7,9,16,.42);white-space:nowrap;pointer-events:none;transition:opacity .18s}
  .label .n{display:inline-block;min-width:14px;height:14px;line-height:14px;text-align:center;
    border-radius:50%;font-size:9.5px;margin-right:4px;color:#04120f}

  /* top bar */
  #topbar{position:fixed;top:0;left:0;right:0;z-index:7;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:calc(10px + var(--safe-t)) 14px 10px;
    background:linear-gradient(180deg,rgba(4,5,11,.82),rgba(4,5,11,0));pointer-events:none}
  #topbar .title{font-family:"Noto Serif KR",serif;font-size:15px;font-weight:700;text-shadow:0 1px 8px #000}
  #topbar .right{display:flex;align-items:center;gap:8px;pointer-events:auto}
  #topbar .prog{font-size:12px;color:#c7cde0;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:5px 10px;backdrop-filter:blur(8px)}
  #topbar .prog b{color:var(--core)}
  .tb{font-size:12.5px;font-weight:700;font-family:inherit;color:var(--ink);background:var(--panel);
    border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;backdrop-filter:blur(8px);min-height:34px}
  .tb.on{background:var(--core);color:#04050b;border-color:var(--core)}
  .tb:active{transform:scale(.96)}

  /* filter tray */
  #tray{position:fixed;top:calc(52px + var(--safe-t));left:14px;right:14px;z-index:7;max-width:640px;margin:0 auto;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 13px;backdrop-filter:blur(12px);
    transform:translateY(-14px);opacity:0;pointer-events:none;transition:.24s;max-height:70vh;overflow:auto}
  #tray.open{transform:none;opacity:1;pointer-events:auto}
  #tray .grp{margin-bottom:11px}
  #tray .grp:last-child{margin-bottom:0}
  #tray .lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:7px}
  #layers,#timeline{display:flex;flex-wrap:wrap;gap:7px}
  #layers .chip{font-size:12px;font-weight:700;padding:7px 11px;border-radius:999px;cursor:pointer;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:#cdd3e4;display:flex;align-items:center;gap:6px;user-select:none;min-height:32px}
  #layers .chip .d{width:9px;height:9px;border-radius:50%;box-shadow:0 0 7px currentColor}
  #layers .chip.off{opacity:.4;text-decoration:line-through}
  #timeline button{font-size:12px;padding:7px 12px;border-radius:999px;cursor:pointer;border:1px solid var(--line);
    background:rgba(255,255,255,.04);color:#c7cde0;font-family:inherit;min-height:32px}
  #timeline button.active{background:var(--time);color:#0a0e18;font-weight:700;border-color:var(--time)}

  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%) translateY(12px);bottom:calc(20px + var(--safe-b));z-index:9;
    background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:12.5px;color:#dbe0ee;
    backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:.3s;text-align:center;max-width:90vw}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* codex panel */
  #panel{position:fixed;top:0;right:0;height:100%;width:min(430px,100vw);z-index:10;background:var(--panel);
    border-left:1px solid var(--line);backdrop-filter:blur(14px);transform:translateX(105%);
    transition:transform .34s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;
    padding:calc(22px + var(--safe-t)) 22px calc(22px + var(--safe-b))}
  #panel.open{transform:translateX(0)}
  #panel .kicker{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:7px}
  #panel h2{font-family:"Noto Serif KR",serif;font-size:23px;margin:0 0 5px;line-height:1.2}
  #panel .sub{font-size:12px;color:var(--muted);margin:0 0 15px}
  #panel .body{font-size:13.5px;line-height:1.72;color:#dde2f0;overflow-y:auto;padding-right:4px;flex:1;-webkit-overflow-scrolling:touch}
  #panel .body p{margin:0 0 11px}
  #panel .body .why,#panel .body .q{position:relative;padding:10px 12px;border-left:2px solid currentColor;
    border-radius:0 8px 8px 0;margin:12px 0;background:rgba(255,255,255,.035)}
  #panel .body .why::before,#panel .body .q::before{display:block;font-size:9.5px;letter-spacing:.13em;
    font-weight:700;opacity:.85;margin-bottom:4px;font-family:"Noto Sans KR"}
  #panel .body .why::before{content:"왜 이렇게 되나"}
  #panel .body .q{font-family:"Noto Serif KR",serif;font-size:15px;color:#fff}
  #panel .body .q::before{content:"파고드는 질문"}
  #panel .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
  #panel .chips span{font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:3px 8px}
  #panel .close{position:absolute;top:calc(14px + var(--safe-t));right:16px;width:36px;height:36px;border:1px solid var(--line);
    background:transparent;color:var(--ink);border-radius:10px;cursor:pointer;font-size:16px}
  #panel .close:active{background:rgba(255,255,255,.08)}

  #intro{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 38%,rgba(20,30,55,.74),rgba(4,5,11,.98));backdrop-filter:blur(4px);transition:opacity .6s}
  #intro.hide{opacity:0;pointer-events:none}
  #intro .card{max-width:620px;text-align:center;padding:0 26px}
  #intro .eyebrow{font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--core);font-weight:700;margin-bottom:13px}
  #intro h1{font-family:"Noto Serif KR",serif;font-size:clamp(27px,5.4vw,46px);margin:0 0 15px;line-height:1.14}
  #intro p{font-size:14px;line-height:1.8;color:#c7cde0;margin:0 auto 11px;max-width:520px}
  #intro .go{margin-top:22px;padding:14px 34px;font-size:15px;font-weight:700;font-family:inherit;color:#04050b;
    background:var(--core);border:0;border-radius:999px;cursor:pointer;box-shadow:0 0 30px rgba(255,209,102,.4)}
  #intro .go:active{transform:scale(.97)}
  #intro .keys{margin-top:16px;font-size:11.5px;color:var(--muted)}
</style>
</head>
<body>
<div id="scene"></div>

<div id="topbar">
  <div class="title">QFUDS SAGA 갤럭시</div>
  <div class="right">
    <span class="prog">발견 <b id="pcount">0</b>/<span id="ptotal">0</span></span>
    <button class="tb" id="btnFilter">필터</button>
    <button class="tb" id="btnHelp">?</button>
  </div>
</div>

<div id="tray">
  <div class="grp"><div class="lbl">레이어</div><div id="layers"></div></div>
  <div class="grp"><div class="lbl">시대 워프</div><div id="timeline"></div></div>
</div>

<div id="toast"></div>

<div id="panel">
  <button class="close" id="pclose">✕</button>
  <div class="kicker" id="pkicker"></div>
  <h2 id="ptitle"></h2>
  <p class="sub" id="psub"></p>
  <div class="body" id="pbody"></div>
  <div class="chips" id="pchips"></div>
</div>

<div id="intro">
  <div class="card">
    <div class="eyebrow">SAGA Worldview Galaxy</div>
    <h1>설정집 전부를<br>하나의 성계로</h1>
    <p>2010년대 딥페이크에서 시작해 Q-Day와 먼 미래 응고기까지. 세계관 인과 사슬, 6부 스토리 아크, 14 도메인 매트릭스, 딥타임라인, 확장 웨이브 시드를 전부 담았습니다.</p>
    <p>상단 필터로 원하는 레이어만 켜고, 시대를 워프하며 좌표를 하나씩 발견하세요.</p>
    <button class="go" id="start">갤럭시 진입</button>
    <div class="keys">한 손가락 회전 · 두 손가락 확대 · 노드 탭으로 열람</div>
  </div>
</div>

<!-- fallback if modern module fails to load -->
<script>
window.addEventListener('load',function(){setTimeout(function(){
  if(!window.__galaxyReady){
    var s=document.getElementById('scene');
    if(s)s.innerHTML='<div class="fallback">3D 엔진을 불러오지 못했습니다.<br>최신 Safari 또는 Chrome 브라우저로 열어 주세요.</div>';
    var i=document.getElementById('intro');if(i)i.style.display='none';
  }
},4500);});
</script>

 body:[P('블록체인은 자기 안의 기록은 검증하지만 바깥 현실은 스스로 알지 못한다. 그 외부 사실을 안으로 들여와 "믿어도 된다"고 말해 주는 장치가 오라클이다.'),

const nodeObjs=[],raycT=[],lines=[];
function makeNode(d,pos,radius,stepNum){
 const colorHex=COLOR[d.cat];const group=new THREE.Group();group.position.copy(pos);
 const mat=new THREE.MeshStandardMaterial({color:colorHex,emissive:colorHex,emissiveIntensity:.6,roughness:.35,metalness:.1});
 const mesh=new THREE.Mesh(new THREE.SphereGeometry(radius,24,24),mat);mesh.userData.node=d;group.add(mesh);
 const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:haloTex,color:colorHex,transparent:true,opacity:.55,blending:THREE.AdditiveBlending,depthWrite:false}));
 glow.scale.setScalar(radius*6);group.add(glow);
 const el=document.createElement('div');el.className='label';
 if(stepNum){const s=document.createElement('span');s.className='n';s.style.background='#'+colorHex.toString(16).padStart(6,'0');s.textContent=stepNum;el.appendChild(s);el.appendChild(document.createTextNode(d.name));}
 else el.textContent=d.name;
 const label=new CSS2DObject(el);label.position.set(0,radius+2.2,0);group.add(label);
 scene.add(group);
 const rec={group,mesh,glow,el,data:d,radius,color:colorHex,basepos:pos.clone(),pulse:0};
 nodeObjs.push(rec);raycT.push(mesh);d._rec=rec;return rec;
}
function link(a,b,color,op){const g=new THREE.BufferGeometry().setFromPoints([a.basepos,b.basepos]);
 const l=new THREE.Line(g,new THREE.LineBasicMaterial({color,transparent:true,opacity:op}));
 l.userData.layers=[a.data.layer,b.data.layer];scene.add(l);lines.push(l);return l;}

function applyVisibility(){
 nodeObjs.forEach(n=>{const d=n.data;const layerOn=(d.layer==='core')||active[d.layer];
  const eraOn=(eraFilter==='all')||d.era==='all'||d.era===eraFilter||d.layer==='time';n.group.visible=layerOn&&eraOn;});
 lines.forEach(l=>{const ls=l.userData.layers||[];l.visible=ls.every(k=>k==='core'||active[k]);});
 relLines.forEach(r=>{r.line.visible=active.character&&r.a.group.visible&&r.b.group.visible;});
}

// ---------------- interaction (tap-friendly) ----------------
const ray=new THREE.Raycaster(),mouse=new THREE.Vector2(),proj=new THREE.Vector3();let hovered=null;const visited=new Set();
const setMouse=(x,y)=>{mouse.x=(x/innerWidth)*2-1;mouse.y=-(y/innerHeight)*2+1;};
function pickAt(x,y){setMouse(x,y);ray.setFromCamera(mouse,camera);
 for(const h of ray.intersectObjects(raycT,false)){const rec=h.object.userData.node._rec;if(rec.group.visible)return rec;}
 // near-tap fallback: nearest visible node within screen radius
 let best=null,bd=34;
 nodeObjs.forEach(n=>{if(!n.group.visible)return;proj.copy(n.group.position).project(camera);
  if(proj.z>1)return;const sx=(proj.x*.5+.5)*innerWidth,sy=(-proj.y*.5+.5)*innerHeight;
  const dd=Math.hypot(sx-x,sy-y);if(dd<bd){bd=dd;best=n;}});
 return best;
}
renderer.domElement.addEventListener('pointermove',e=>{if(e.pointerType!=='mouse')return;
 setMouse(e.clientX,e.clientY);ray.setFromCamera(mouse,camera);
 const hit=ray.intersectObjects(raycT,false).find(h=>h.object.userData.node._rec.group.visible);
 const rec=hit?hit.object.userData.node._rec:null;
 if(rec!==hovered){hovered=rec;document.body.style.cursor=rec?'pointer':'default';}});
let downXY=null;
renderer.domElement.addEventListener('pointerdown',e=>{downXY=[e.clientX,e.clientY];});
renderer.domElement.addEventListener('pointerup',e=>{if(!downXY)return;
 const moved=Math.hypot(e.clientX-downXY[0],e.clientY-downXY[1]);downXY=null;
 if(moved>10)return; // was a drag, not a tap
 const rec=pickAt(e.clientX,e.clientY);if(rec)openNode(rec);});

 const kick=document.getElementById('pkicker');kick.textContent=KICK[d.cat]||'';
 const hex='#'+COLOR[d.cat].toString(16).padStart(6,'0');kick.style.color=hex;
 document.getElementById('ptitle').textContent=d.name;document.getElementById('psub').textContent=d.sub||'';
 const body=document.getElementById('pbody');body.innerHTML='';
 (d.body||[]).forEach(seg=>{const p=document.createElement('p');
  if(seg.t==='why'){p.className='why';p.style.color=hex;}else if(seg.t==='q'){p.className='q';p.style.color=hex;}
  p.appendChild(document.createTextNode(seg.x));body.appendChild(p);});
 const chips=document.getElementById('pchips');chips.innerHTML='';
 (d.canon||[]).forEach(c=>{const s=document.createElement('span');s.textContent=c;chips.appendChild(s);});
 body.scrollTop=0;panel.classList.add('open');controls.autoRotate=false;currentOpen=rec;
 tray.classList.remove('open');btnFilter.classList.remove('on');
 if(!visited.has(d.name)){visited.add(d.name);document.getElementById('pcount').textContent=visited.size;}
 rec.pulse=1;}
document.getElementById('pclose').onclick=()=>{panel.classList.remove('open');currentOpen=null;controls.autoRotate=true;};

let flying=null,currentOpen=null;
function flyTo(rec){const target=rec.group.position.clone();const dist=rec.radius*7+22;
 const dir=camera.position.clone().sub(target).normalize();
 const dest=target.clone().add(dir.multiplyScalar(dist)).add(new THREE.Vector3(0,rec.radius*1.6,0));
 flying={fromCam:camera.position.clone(),toCam:dest,fromT:controls.target.clone(),toT:target,t:0};}
function flyToView(pos,target){flying={fromCam:camera.position.clone(),toCam:pos.clone(),fromT:controls.target.clone(),toT:target.clone(),t:0};}
function flyToFit(recs){const c=new THREE.Vector3();recs.forEach(r=>c.add(r.group.position));c.multiplyScalar(1/recs.length);
 let rad=28;recs.forEach(r=>{rad=Math.max(rad,r.group.position.distanceTo(c));});
 const dir=camera.position.clone().sub(controls.target).normalize();
 const dest=c.clone().add(dir.multiplyScalar(rad*2.4+50));
 flying={fromCam:camera.position.clone(),toCam:dest,fromT:controls.target.clone(),toT:c.clone(),t:0};}

document.getElementById('start').onclick=()=>{document.getElementById('intro').classList.add('hide');
 showToast('한 손가락 회전 · 두 손가락 확대 · 노드 탭으로 열람',5000);};
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);labelRenderer.setSize(innerWidth,innerHeight);});

const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
 nodeObjs.forEach((n,i)=>{if(!n.group.visible)return;
  if(n.orbit&&n!==currentOpen){const o=n.orbit,a=o.ph+t*o.sp;
   n.group.position.set(o.cx+Math.cos(a)*o.r,o.cy+Math.sin(t*0.5+i)*0.6,o.cz+Math.sin(a)*o.r);}
  else n.group.position.y=n.basepos.y+Math.sin(t*0.5+i)*0.5;
  const tgt=(n===hovered)?1.4:(visited.has(n.data.name)?1.08:1);
  n.mesh.scale.setScalar(n.mesh.scale.x+(tgt-n.mesh.scale.x)*0.12);
  n.mesh.material.emissiveIntensity=0.5+(n===hovered?0.5:0)+Math.sin(t*1.4+i)*0.05;
  if(n.pulse){n.glow.scale.setScalar(n.radius*6*(1+n.pulse*0.6));n.pulse*=0.92;if(n.pulse<0.02)n.pulse=0;}
  const dd=camera.position.distanceTo(n.group.position);
  n.el.style.opacity=dd>430?'0':(dd>300?'0.4':'');});
 relLines.forEach(r=>{if(!r.line.visible)return;const p=r.geo.attributes.position.array;
  p[0]=r.a.group.position.x;p[1]=r.a.group.position.y;p[2]=r.a.group.position.z;
  p[3]=r.b.group.position.x;p[4]=r.b.group.position.y;p[5]=r.b.group.position.z;r.geo.attributes.position.needsUpdate=true;});
 sun.group.rotation.y=t*0.05;sun.mesh.material.emissiveIntensity=0.7+Math.sin(t*1.2)*0.12;
 if(flying){flying.t=Math.min(1,flying.t+0.02);const e=1-Math.pow(1-flying.t,3);
  camera.position.lerpVectors(flying.fromCam,flying.toCam,e);controls.target.lerpVectors(flying.fromT,flying.toT,e);if(flying.t>=1)flying=null;}
 controls.update();renderer.render(scene,camera);labelRenderer.render(scene,camera);}
applyVisibility();animate();
window.__galaxyReady=true;
</script>
