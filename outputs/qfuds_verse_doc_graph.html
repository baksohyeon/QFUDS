"00_bible": {color: {background: "#59a14f", border: "#333"}},
"00_workroom": {color: {background: "#b07aa1", border: "#333"}},
"10_story_design": {color: {background: "#f28e2b", border: "#333"}},
"20_drafts": {color: {background: "#9c755f", border: "#333"}},
"30_revisions": {color: {background: "#edc948", border: "#333"}},
"40_release": {color: {background: "#76b7b2", border: "#333"}},
"root": {color: {background: "#bab0ac", border: "#333"}},
"misc": {color: {background: "#bab0ac", border: "#333"}},
"dangling": {color: {background: "#000000", border: "#333"}} };
const net = new vis.Network(document.getElementById('net'), {nodes, edges}, {
  groups,
  nodes: { shape: 'dot', scaling: {min: 6, max: 40}, font: {size: 11} },
  edges: { arrows: 'to', color: {color: '#aaa'}, smooth: {type: 'continuous'} },
  physics: { barnesHut: {gravitationalConstant: -8000, springLength: 120}, stabilization: {iterations: 300} },
  interaction: { hover: true, tooltipDelay: 100 }
});
document.getElementById('q').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const term = e.target.value.trim().toLowerCase();
  if (!term) return;
  const hit = raw.nodes.find(n => n.id.toLowerCase().includes(term) || (n.title||'').toLowerCase().includes(term));
  if (hit) { net.selectNodes([hit.id]); net.focus(hit.id, {scale: 1.2, animation: true}); }
});
</script>
